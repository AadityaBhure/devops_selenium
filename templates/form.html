<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>User Registration</h2>

    <form action="/submit" method="post">

        <input type="text" name="name" id="name" placeholder="Full Name" required>

        <input type="number" name="age" id="age" placeholder="Age (18+)" required>

        <select name="gender" id="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <input type="text" name="phone" id="phone" placeholder="Phone (10 digits)"
               pattern="[0-9]{10}" required>

        <input type="email" name="email" id="email" placeholder="Email" required>

        <textarea name="address" id="address" placeholder="Address" required></textarea>

        <input type="password" name="password" id="password" placeholder="Password (min 6 chars)" required>

        <button type="submit" id="submit">Register</button>

    </form>
</div>

</body>
</html>
